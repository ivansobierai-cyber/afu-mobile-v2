name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: afu_mobile
          MYSQL_USER: afu
          MYSQL_PASSWORD: afu_local_dev
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uafu -pafu_local_dev"
          --health-interval=8s
          --health-timeout=5s
          --health-retries=20
    env:
      JWT_SECRET: ci_jwt_secret_afu_mobile_validate
      NODE_ENV: test
      DATABASE_URL: mysql://afu:afu_local_dev@127.0.0.1:3306/afu_mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Apply schema (MySQL)
        run: |
          npx drizzle-kit push --force
          npm run db:safras:apply
          npm run db:archive:apply


      - name: Build web (Vercel)
        run: npm run build:web:preview && npm run prepare:web-dist

      - name: Unit + integration tests (com DATABASE_URL)
        run: npm run test:ci
