services:
  mysql:
    image: mysql:8.0
    container_name: afu-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: afu_mobile
      MYSQL_USER: afu
      MYSQL_PASSWORD: afu_local_dev
    volumes:
      - afu_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uafu", "-pafu_local_dev"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  afu_mysql_data:
