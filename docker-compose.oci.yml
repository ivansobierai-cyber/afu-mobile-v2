services:
  mysql:
    image: mysql:8.0
    container_name: afu-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-afu_mobile}
      MYSQL_USER: ${MYSQL_USER:-afu}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
    volumes:
      - afu_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u${MYSQL_USER:-afu}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: afu-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://${MYSQL_USER:-afu}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-afu_mobile}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      VITE_APP_ID: ${VITE_APP_ID:-afu-mobile}
      SEED_ON_START: ${SEED_ON_START:-1}

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        EXPO_PUBLIC_API_BASE_URL: ""
        EXPO_PUBLIC_SHOW_DEMO_LOGIN: ${EXPO_PUBLIC_SHOW_DEMO_LOGIN:-1}
    container_name: afu-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  afu_mysql_data:
